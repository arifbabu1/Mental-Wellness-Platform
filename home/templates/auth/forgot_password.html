{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Mental Wellness Platform</title>
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .login-page {
            min-height: 100vh;
            background: linear-gradient(135deg, #08a1f7 0%, #09e0fe 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .login-page::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="grid" width="10" height="10" patternUnits="userSpaceOnUse"><path d="M 10 0 L 0 0 0 10" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/></pattern></defs><rect width="100" height="100" fill="url(%23grid)"/></svg>');
            opacity: 0.3;
            animation: float 20s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .login-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 60px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 480px;
            width: 100%;
            position: relative;
            animation: slideUp 0.8s ease-out;
            transition: all 0.3s ease;
        }

        .login-container:hover {
            transform: scale(1.02);
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.5);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 50px;
            position: relative;
        }

        .login-logo {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #08a1f7, #09e0fe);
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            box-shadow: 0 15px 35px rgba(8, 161, 247, 0.4);
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .login-logo i {
            font-size: 2.5rem;
            color: white;
            animation: float 3s ease-in-out infinite;
        }

        .login-title {
            font-size: 2.5rem;
            font-weight: 900;
            color: #2c3e50;
            margin-bottom: 15px;
            text-align: center;
            background: linear-gradient(135deg, #08a1f7, #09e0fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .login-subtitle {
            color: #6c757d;
            font-size: 1.1rem;
            text-align: center;
            margin-bottom: 40px;
            font-weight: 500;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 30px;
            position: relative;
        }

        .form-label {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #2c3e50;
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-label i {
            width: 24px;
            height: 24px;
            background: linear-gradient(135deg, #08a1f7, #09e0fe);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.9rem;
            box-shadow: 0 4px 12px rgba(8, 161, 247, 0.3);
        }

        .form-control {
            width: 100%;
            padding: 18px 20px;
            border: 2px solid #e9ecef;
            border-radius: 18px;
            font-size: 1rem;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .form-control::placeholder {
            color: #6c757d;
            font-style: italic;
        }

        .form-control:focus {
            outline: none;
            border-color: #08a1f7;
            box-shadow: 0 0 0 5px rgba(8, 161, 247, 0.2);
            background: white;
            transform: translateY(-3px) scale(1.02);
        }

        .btn-login {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, #08a1f7, #09e0fe);
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            margin-top: 40px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 10px 30px rgba(8, 161, 247, 0.3);
        }

        .btn-login .btn-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(8, 161, 247, 0.4);
            background: linear-gradient(135deg, #09e0fe, #08a1f7);
        }

        .btn-login:active {
            transform: translateY(-1px);
            box-shadow: 0 8px 25px rgba(8, 161, 247, 0.3);
        }

        .quick-links {
            text-align: center;
            margin-top: 40px;
        }

        .quick-link {
            color: #08a1f7;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-block;
            margin: 0 15px;
            padding: 10px 20px;
            border: 2px solid #e9ecef;
            border-radius: 15px;
        }

        .quick-link:hover {
            color: white;
            background: linear-gradient(135deg, #08a1f7, #09e0fe);
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(8, 161, 247, 0.4);
        }

        .alert {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.9), rgba(220, 38, 38, 0.9));
            color: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            animation: shake 0.5s ease-in-out;
        }

        .alert-success {
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.9), rgba(22, 163, 74, 0.9)) !important;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #08a1f7;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            color: #09e0fe;
            transform: translateX(-3px);
        }

        @media (max-width: 768px) {
            .login-container {
                padding: 35px 30px;
                margin: 20px;
                max-width: 100%;
                width: 100%;
                border-radius: 20px;
            }

            .login-logo {
                width: 70px;
                height: 70px;
                margin-bottom: 20px;
            }

            .login-title {
                font-size: 1.8rem;
                letter-spacing: 1px;
            }

            .form-control {
                padding: 15px 20px;
                font-size: 1rem;
                border-radius: 15px;
            }

            .btn-login {
                padding: 18px;
                font-size: 1.1rem;
                margin-top: 35px;
                border-radius: 15px;
            }
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 25px 20px;
                margin: 10px;
                border-radius: 15px;
            }

            .login-title {
                font-size: 1.5rem;
            }

            .form-control {
                padding: 14px 18px;
                font-size: 0.95rem;
                border-radius: 12px;
            }

            .btn-login {
                padding: 16px;
                font-size: 1rem;
                margin-top: 30px;
                border-radius: 12px;
            }

            .quick-link {
                font-size: 0.85rem;
                padding: 8px 15px;
                margin: 0;
                width: 100%;
                text-align: center;
            }
        }
    </style>
    <link rel="stylesheet" href="{% static 'css/responsive-compact.css' %}">
</head>
<body class="login-page">
    <div class="login-container">
        <a href="{% url 'login' %}" class="back-link">
            <i class="fas fa-arrow-left"></i>
            Back to Login
        </a>

        <div class="login-header">
            <div class="login-logo">
                <i class="fas fa-key"></i>
            </div>
            <h1 class="login-title">Forgot Password</h1>
            <p class="login-subtitle">Enter your account email to receive a secure reset link</p>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="alert {% if message.tags == 'success' %}alert-success{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="post" action="{% url 'forgot_password_verify' %}">
            {% csrf_token %}

            <div class="form-group">
                <label for="id_email" class="form-label">
                    <i class="fas fa-envelope"></i>
                    Email Address
                </label>
                <input type="email" id="id_email" name="email" class="form-control" placeholder="Enter your account email address" required autocomplete="email">
            </div>

            <button type="submit" class="btn-login">
                <span class="btn-content">
                    <i class="fas fa-check-circle"></i>
                    Send Reset Link
                </span>
            </button>
        </form>

        <div class="quick-links">
            <a href="{% url 'login' %}" class="quick-link">
                <i class="fas fa-sign-in-alt"></i>
                Back to Login
            </a>
        </div>
    </div>
</body>
</html>
